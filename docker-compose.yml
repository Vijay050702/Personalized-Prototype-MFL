version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pp-mfl-backend:latest
    container_name: pp-mfl-backend
    restart: unless-stopped
    expose:
      - "8000"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - "CORS_ORIGINS=${CORS_ORIGINS:-[\"*\"]}"
      - DATASETS_ROOT=/app/datasets
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    volumes:
      - dataset-data:/app/datasets
      - checkpoint-data:/app/checkpoints
      - experiment-data:/app/experiments
      - log-data:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - pp-mfl-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:${FRONTEND_PORT:-80}
    image: pp-mfl-frontend:latest
    container_name: pp-mfl-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - pp-mfl-network

volumes:
  dataset-data:
    name: pp-mfl-datasets
  checkpoint-data:
    name: pp-mfl-checkpoints
  experiment-data:
    name: pp-mfl-experiments
  log-data:
    name: pp-mfl-logs

networks:
  pp-mfl-network:
    name: pp-mfl-network
    driver: bridge
